name: Build and Test WasmEdge on riscv64 arch
concurrency:
  group: build-riscv64-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/build_for_riscv.yml"
      - "include/**"
      - "lib/**"
      - "test/**"
      - "!test/plugins/**"
      - "thirdparty/**"
      - "tools/**"
      - "CMakeLists.txt"
      - "cmake/**"
  pull_request:
    branches:
      - master
      - 'proposal/**'
    paths:
      - ".github/workflows/build_for_riscv.yml"
      - "include/**"
      - "lib/**"
      - "test/**"
      - "!test/plugins/**"
      - "thirdparty/**"
      - "tools/**"
      - "CMakeLists.txt"
      - "cmake/**"

permissions:
  contents: read

jobs:
  lint:
    uses: ./.github/workflows/reusable-call-linter.yml

  cross_compile_riscv64:
    name: Cross-compile for RISC-V64
    runs-on: ubuntu-22.04
    needs: lint
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
      with:
        egress-policy: audit

    - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      with:
        fetch-depth: 0

    - name: Ensure git safe directory
      run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

    - name: Configure apt for multi-architecture and install dependencies
      shell: bash
      run: |
        echo "--- Locking existing sources to amd64 ---"
        for f in /etc/apt/sources.list /etc/apt/sources.list.d/*.list; do
          if [ -f "$f" ] && ! grep -q "\[arch=" "$f"; then
            echo "Modifying $f"
            sudo sed -i -e 's/^deb /deb [arch=amd64] /' -e 's/^deb-src /deb-src [arch=amd64] /' "$f"
          else
            echo "Skipping $f (already has arch specifier or is not a file)"
          fi
        done
        echo "--- Installing host tools and cross-compiler ---"
        sudo apt-get update -q -y
        sudo apt-get install -q -y cmake ninja-build git software-properties-common \
                                  llvm-15-dev liblld-15-dev \
                                  gcc-riscv64-linux-gnu g++-riscv64-linux-gnu
        echo "--- Adding riscv64 architecture and its repository ---"
        sudo dpkg --add-architecture riscv64
        echo "deb [arch=riscv64] http://ports.ubuntu.com/ubuntu-ports/ jammy main restricted universe multiverse" | sudo tee /etc/apt/sources.list.d/ubuntu-ports.list
        echo "deb [arch=riscv64] http://ports.ubuntu.com/ubuntu-ports/ jammy-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/ubuntu-ports.list
        echo "deb [arch=riscv64] http://ports.ubuntu.com/ubuntu-ports/ jammy-security main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/ubuntu-ports.list
        echo "--- Installing riscv64 cross-compiled libraries ---"
        sudo apt-get update -q -y
        sudo apt-get install -q -y libc6-dev:riscv64 zlib1g-dev:riscv64 libncurses-dev:riscv64

    - name: Configure and Build WasmEdge for RISC-V64
      run: |
        cat > riscv64-toolchain.cmake << 'EOF'
        set(CMAKE_SYSTEM_NAME Linux)
        set(CMAKE_SYSTEM_PROCESSOR riscv64)
        set(CMAKE_C_COMPILER riscv64-linux-gnu-gcc)
        set(CMAKE_CXX_COMPILER riscv64-linux-gnu-g++)
        set(CMAKE_FIND_ROOT_PATH /usr/riscv64-linux-gnu)
        set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
        set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
        set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
        set(CMAKE_FIND_ROOT_PATH_MODE_PACKAGE ONLY)

        # --- THE DEFINITIVE FIX ---
        # The file `test/api/helper.cpp` has a hard-coded architecture check
        # that is missing `riscv64`. This causes a code mismatch during cross-compilation.
        # We solve this by adding a compiler definition to trick its preprocessor
        # into taking the correct code path for native `__int128`, which aligns
        # it with how the rest of the library is being built.
        set(CMAKE_C_FLAGS "${CMAKE_C_FLAGS} -D__aarch64__=1" CACHE STRING "" FORCE)
        set(CMAKE_CXX_FLAGS "${CMAKE_CXX_FLAGS} -D__aarch64__=1" CACHE STRING "" FORCE)

        # WasmEdge build configuration
        set(WASMEDGE_BUILD_AOT_RUNTIME OFF CACHE BOOL "Disable AOT for cross-compiling")
        set(WASMEDGE_BUILD_TESTS ON CACHE BOOL "Build tests to run in QEMU")
        set(WASMEDGE_BUILD_PLUGINS OFF CACHE BOOL "Disable plugins for minimal build")
        EOF

        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_TOOLCHAIN_FILE=riscv64-toolchain.cmake \
          -DCMAKE_INSTALL_PREFIX=/tmp/wasmedge-install-riscv64 \
          -DLLVM_DIR=$(llvm-config-15 --cmakedir)

        cmake --build build --parallel
        cmake --install build

    - name: Package RISC-V64 artifacts
      uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
      with:
        name: wasmedge-riscv64-artifacts
        path: |
          build/test/
          /tmp/wasmedge-install-riscv64/
        retention-days: 1

  test_riscv64:
    name: Test RISC-V64 in QEMU
    runs-on: ubuntu-22.04
    needs: cross_compile_riscv64
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
      with:
        egress-policy: audit

    - name: Download RISC-V64 artifacts
      uses: actions/download-artifact@fa0a91b8c1db80cabb49d9e5db8c07e4f5c35115 # v4.1.8
      with:
        name: wasmedge-riscv64-artifacts
        path: wasmedge-riscv64

    - name: Set up QEMU and RISC-V libraries for testing
      shell: bash
      run: |
        echo "--- Locking existing sources to amd64 ---"
        for f in /etc/apt/sources.list /etc/apt/sources.list.d/*.list; do
          if [ -f "$f" ] && ! grep -q "\[arch=" "$f"; then
            echo "Modifying $f"
            sudo sed -i -e 's/^deb /deb [arch=amd64] /' -e 's/^deb-src /deb-src [arch=amd64] /' "$f"
          else
            echo "Skipping $f (already has arch specifier or is not a file)"
          fi
        done
        echo "--- Installing QEMU and riscv64 runtime libraries ---"
        sudo apt-get update -q -y
        sudo apt-get install -q -y qemu-user-static
        sudo dpkg --add-architecture riscv64
        echo "deb [arch=riscv64] http://ports.ubuntu.com/ubuntu-ports/ jammy main restricted universe multiverse" | sudo tee /etc/apt/sources.list.d/ubuntu-ports.list
        sudo apt-get update -q -y
        sudo apt-get install -q -y libstdc++6:riscv64 zlib1g:riscv64 libncurses6:riscv64 libtinfo6:riscv64

    - name: Run tests in QEMU
      run: |
        export QEMU_LD_PREFIX=/usr/riscv64-linux-gnu
        cd wasmedge-riscv64/test
        ctest --output-on-failure
